                          ? 'bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500'
                          : 'bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700'
                      } text-white font-semibold py-4 rounded-lg transition-all duration-300 transform hover:scale-[1.02]`}
                    >
                      Folytatás →
                    </button>
                  </div>
                  
                  <div className={`absolute top-0 left-0 w-20 h-20 ${
                    option.correct ? 'border-t-2 border-l-2 border-green-400' : 'border-t-2 border-l-2 border-red-400'
                  } animate-corner-pulse`}></div>
                  <div className={`absolute bottom-0 right-0 w-20 h-20 ${
                    option.correct ? 'border-b-2 border-r-2 border-green-400' : 'border-b-2 border-r-2 border-red-400'
                  } animate-corner-pulse`} style={{animationDelay: '0.2s'}}></div>
                </div>
                  );
                })()
              )}
            </div>
          </div>
        )}
      </div>

      <style jsx>{`
        @keyframes fade-in {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scan {
          0% { top: -2px; }
          100% { top: 100%; }
        }
        @keyframes success-pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.02); }
        }
        @keyframes error-shake {
          0%, 100% { transform: translateX(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
          20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        @keyframes glow-green {
          0%, 100% { filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.8)); }
          50% { filter: drop-shadow(0 0 25px rgba(34, 197, 94, 1)); }
        }
        @keyframes glow-red {
          0%, 100% { filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.8)); }
          50% { filter: drop-shadow(0 0 25px rgba(239, 68, 68, 1)); }
        }
        @keyframes pulse-slow {
          0%, 100% { opacity: 0.3; }
          50% { opacity: 0.6; }
        }
        @keyframes pulse-fast {
          0%, 100% { opacity: 0.2; }
          50% { opacity: 0.5; }
        }
        @keyframes corner-pulse {
          0%, 100% { opacity: 0.3; }
          50% { opacity: 1; }
        }
        @keyframes shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
        .animate-fade-in {
          animation: fade-in 0.6s ease-out;
        }
        .animate-scan {
          animation: scan 8s linear infinite;
        }
        .animate-shimmer {
          animation: shimmer 3s ease-in-out infinite;
        }
        .animate-success-pulse {
          animation: success-pulse 0.6s ease-out;
        }
        .animate-error-shake {
          animation: error-shake 0.5s ease-out;
        }
        .animate-glow-green {
          animation: glow-green 1.5s ease-in-out infinite;
        }
        .animate-glow-red {
          animation: glow-red 1s ease-in-out infinite;
        }
        .animate-pulse-slow {
          animation: pulse-slow 3s ease-in-out infinite;
        }
        .animate-pulse-fast {
          animation: pulse-fast 1s ease-in-out infinite;
        }
        .animate-corner-pulse {
          animation: corner-pulse 2s ease-in-out infinite;
        }
        
        /* Points animation */
        .animate-points-popup {
          animation: pointsPopup 2s ease-out;
        }
        
        @keyframes pointsPopup {
          0% {
            transform: scale(0) rotate(-10deg);
            opacity: 0;
          }
          40% {
            transform: scale(1.2) rotate(5deg);
            opacity: 1;
          }
          60% {
            transform: scale(1) rotate(0deg);
            opacity: 1;
          }
          100% {
            transform: scale(0.8);
            opacity: 0;
          }
        }
        
        @keyframes pointsScale {
          0% {
            transform: scale(0);
          }
          40% {
            transform: scale(1.1);
          }
          60% {
            transform: scale(1);
          }
          100% {
            transform: scale(0.9);
            opacity: 0;
          }
        }
        
        @keyframes pointsFade {
          0% {
            opacity: 0;
            transform: translateY(20px);
          }
          40% {
            opacity: 1;
            transform: translateY(0);
          }
          100% {
            opacity: 0;
            transform: translateY(-10px);
          }
        }
        
        /* Custom range slider styling */
        input[type="range"]::-webkit-slider-thumb {
          appearance: none;
          width: 16px;
          height: 16px;
          border-radius: 50%;
          background: #22c55e;
          cursor: pointer;
          border: 2px solid #15803d;
        }
        input[type="range"]::-moz-range-thumb {
          width: 16px;
          height: 16px;
          border-radius: 50%;
          background: #22c55e;
          cursor: pointer;
          border: 2px solid #15803d;
        }
      `}</style>
    </div>
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('cyber-root'));
root.render(<CyberSimulator />);
  </script>
</body>
</html>
