<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gloster Cloud - Cyber Security Simulator</title>
  
  <meta name="description" content="Teszteld kiberbiztonsági tudásodat! 8 valós támadási forgatókönyv interaktív szimulátorban.">
  <meta name="keywords" content="kiberbiztonsági, szimulátor, Gloster Cloud, IT biztonság">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Cyber Security Simulator - Gloster Cloud">
  <meta property="og:description" content="Teszteld kiberbiztonsági tudásodat! 8 valós támadási forgatókönyv.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gloster-cloud.github.io/cyber-simulator/">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }
    
    #cyber-root {
      width: 100%;
      min-height: 100vh;
    }
    
    /* Loading indicator */
    .loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
    }
    
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(34, 197, 94, 0.2);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      color: #22c55e;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- React App Container -->
  <div id="cyber-root">
    <!-- Loading Indicator (will be replaced by React app) -->
    <div class="loading-container">
      <div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Betöltés...</div>
      </div>
    </div>
  </div>
  
  <!-- React Bundle -->
  <script src="./cyber-simulator.jsx"></script>
</body>
</html>
